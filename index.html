<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GSAP Car Website</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:
radial-gradient(circle at top,
#1c2740,
#050816);
color:white;
}

/* Navbar */

nav{
position:fixed;
top:0;
width:100%;
padding:25px 80px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.logo{
font-size:2rem;
font-weight:700;
letter-spacing:4px;
}

nav ul{
display:flex;
gap:40px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

/* Hero */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 8%;
}

.left{
max-width:600px;
}

.subtitle{
color:#00e5ff;
font-size:18px;
letter-spacing:4px;
margin-bottom:20px;
}

h1{
font-size:90px;
line-height:1;
margin-bottom:20px;
}

h1 span{
display:block;
color:#00e5ff;
}

p{
font-size:18px;
opacity:.8;
line-height:1.8;
margin-bottom:30px;
}

.buttons{
display:flex;
gap:20px;
}

.btn{
padding:16px 35px;
border:none;
cursor:pointer;
border-radius:50px;
font-size:16px;
font-weight:600;
}

.primary{
background:#00e5ff;
}

.secondary{
background:transparent;
border:1px solid white;
color:white;
}

/* Car */

.right{
position:relative;
width:700px;
height:400px;
}

.glow{
position:absolute;
width:500px;
height:500px;
background:#00e5ff;
filter:blur(150px);
opacity:.15;
left:50%;
top:50%;
transform:translate(-50%,-50%);
}

.car{
position:absolute;
width:100%;
bottom:50px;
filter:
drop-shadow(0 50px 60px rgba(0,229,255,.3));
}

.wheel{
position:absolute;
width:90px;
height:90px;
border-radius:50%;
border:8px solid #444;
background:#111;
bottom:45px;
}

.wheel::after{
content:'';
position:absolute;
width:18px;
height:18px;
background:#888;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.front{
right:135px;
}

.back{
left:115px;
}

/* Road */

.road{
position:absolute;
bottom:0;
width:200%;
height:8px;
background:
repeating-linear-gradient(
90deg,
white 0px,
white 100px,
transparent 100px,
transparent 180px
);
}

</style>
</head>
<body>

<nav>
<div class="logo">AUTO X</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Cars</a></li>
<li><a href="#">Gallery</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<section class="hero">

<div class="left">

<div class="subtitle">
NEXT GENERATION
</div>

<h1>
DRIVE
<span>THE FUTURE</span>
</h1>

<p>
Discover futuristic electric performance,
cutting-edge technology and luxury engineering.
</p>

<div class="buttons">
<button class="btn primary">
Explore
</button>

<button class="btn secondary">
Watch Video
</button>
</div>

</div>

<div class="right">

<div class="glow"></div>

<img
class="car"
src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1200"
>

<div class="wheel back"></div>
<div class="wheel front"></div>

</div>

</section>

<div class="road"></div>

<script>

// MASTER TIMELINE

const tl = gsap.timeline();

tl.from(".logo",{
y:-100,
opacity:0,
duration:1
})

.from("nav li",{
y:-50,
opacity:0,
stagger:0.1,
duration:.7
},"-=0.5")

.from(".subtitle",{
x:-100,
opacity:0,
duration:1
})

.from("h1",{
y:100,
opacity:0,
duration:1
},"-=0.5")

.from("p",{
y:50,
opacity:0,
duration:1
},"-=0.6")

.from(".btn",{
scale:0,
opacity:0,
stagger:0.2,
duration:.8
},"-=0.4")

.from(".car",{
x:1000,
rotation:-10,
duration:2,
ease:"power4.out"
},"-=1")

.from(".wheel",{
scale:0,
duration:1
},"-=1");

// Wheels

gsap.to(".wheel",{
rotation:360,
repeat:-1,
ease:"none",
duration:.6
});

// Road

gsap.to(".road",{
x:-400,
repeat:-1,
ease:"none",
duration:2
});

// Floating car

gsap.to(".car",{
y:-15,
repeat:-1,
yoyo:true,
duration:2,
ease:"sine.inOut"
});

// Glow pulse

gsap.to(".glow",{
scale:1.2,
opacity:.25,
repeat:-1,
yoyo:true,
duration:2
});

// Mouse parallax

document.addEventListener("mousemove",(e)=>{

let x=(e.clientX/window.innerWidth-.5)*40;
let y=(e.clientY/window.innerHeight-.5)*40;

gsap.to(".car",{
x:x,
y:y,
duration:1
});

gsap.to(".glow",{
x:x*0.5,
y:y*0.5,
duration:1
});

});

</script>

</body>
</html>
