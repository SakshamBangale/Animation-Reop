<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Future Car</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>

</style>
</head>
<body>

<div id="stars"></div>

<nav>

<div class="logo">AUTO X</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Models</a></li>
<li><a href="#">Gallery</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>

<section class="hero">

<div class="left">

<div class="tag">
NEXT GENERATION ELECTRIC
</div>

<h1 class="title">
DRIVE
<span>THE FUTURE</span>
</h1>

<p class="desc">
Luxury performance engineered for tomorrow.
Experience speed, innovation and cutting-edge
technology like never before.
</p>

<div class="buttons">

<button class="btn primary">
Explore Cars
</button>

<button class="btn secondary">
Watch Video
</button>

</div>

</div>

<div class="scene">

<div class="glow"></div>

<div class="light"></div>

<div class="car">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1200" alt="">
</div>

<div class="wheel back"></div>
<div class="wheel front"></div>

</div>

</section>

<div class="road"></div>

<script>

/* STARS */

for(let i=0;i<250;i++){

const star=document.createElement("div");

star.classList.add("star");

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

let size=Math.random()*3;

star.style.width=size+"px";
star.style.height=size+"px";

document.getElementById("stars")
.appendChild(star);

gsap.to(star,{
y:-1500,
repeat:-1,
ease:"none",
duration:Math.random()*25+15
});

}

/* INTRO */

const tl=gsap.timeline();

tl.from(".logo",{
y:-100,
opacity:0,
duration:1
})

.from("nav li",{
y:-50,
opacity:0,
stagger:.1,
duration:.6
},"-=.6")

.from(".tag",{
x:-100,
opacity:0
})

.from(".title",{
y:150,
opacity:0,
duration:1.2
},"-=.4")

.from(".desc",{
opacity:0,
y:50
},"-=.6")

.from(".btn",{
scale:0,
opacity:0,
stagger:.2
},"-=.6")

.from(".car",{
x:1500,
rotation:-10,
duration:2,
ease:"expo.out"
},"-=1")

.from(".wheel",{
scale:0,
duration:1
},"-=1");

/* ROAD */

gsap.to(".road",{
x:-500,
repeat:-1,
ease:"none",
duration:2
});

/* WHEELS */

gsap.to(".wheel",{
rotation:360,
repeat:-1,
ease:"none",
duration:.25
});

/* CAR FLOAT */

gsap.to(".car",{
y:-15,
repeat:-1,
yoyo:true,
duration:2,
ease:"sine.inOut"
});

/* GLOW */

gsap.to(".glow",{
scale:1.3,
opacity:.35,
repeat:-1,
yoyo:true,
duration:2
});

/* HEADLIGHT */

gsap.to(".light",{
opacity:.4,
repeat:-1,
yoyo:true,
duration:.6
});

/* MOUSE PARALLAX */

window.addEventListener("mousemove",(e)=>{

let x=(e.clientX/window.innerWidth-.5)*60;
let y=(e.clientY/window.innerHeight-.5)*40;

gsap.to(".car",{
x:x,
y:y,
duration:1
});

gsap.to(".glow",{
x:x*.5,
y:y*.5,
duration:1.5
});

});

/* MAGNETIC BUTTON */

document.querySelectorAll(".btn")
.forEach(btn=>{

btn.addEventListener("mousemove",(e)=>{

const rect=btn.getBoundingClientRect();

const x=e.clientX-rect.left-rect.width/2;
const y=e.clientY-rect.top-rect.height/2;

gsap.to(btn,{
x:x*.25,
y:y*.25,
duration:.3
});

});

btn.addEventListener("mouseleave",()=>{

gsap.to(btn,{
x:0,
y:0,
duration:.5
});

});

});

</script>

</body>
</html>
