<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Future Car</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:
radial-gradient(circle at center,
#0d1328,
#02040c);
color:white;
}

/* STARS */

#stars{
position:fixed;
inset:0;
overflow:hidden;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
}

/* NAVBAR */

nav{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
width:90%;
padding:18px 40px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.1);

border-radius:20px;

display:flex;
justify-content:space-between;
align-items:center;

z-index:100;
}

.logo{
font-size:2rem;
font-weight:800;
letter-spacing:5px;
}

nav ul{
display:flex;
gap:35px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

/* HERO */

.hero{
position:relative;
z-index:5;
height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 8%;
}

.left{
max-width:600px;
}

.tag{
color:#00f7ff;
letter-spacing:4px;
margin-bottom:15px;
}

.title{
font-size:6rem;
line-height:1;
font-weight:900;
}

.title span{
display:block;
color:#00f7ff;
}

.desc{
margin-top:25px;
opacity:.75;
font-size:18px;
line-height:1.8;
}

.buttons{
display:flex;
gap:20px;
margin-top:35px;
}

.btn{
padding:16px 35px;
border:none;
cursor:pointer;
border-radius:50px;
font-size:16px;
font-weight:700;
transition:.3s;
}

.primary{
background:#00f7ff;
}

.secondary{
background:transparent;
color:white;
border:1px solid rgba(255,255,255,.3);
}

/* CAR AREA */

.scene{
position:relative;
width:700px;
height:450px;
perspective:1000px;
}

.glow{
position:absolute;
width:500px;
height:500px;
background:#00f7ff;
filter:blur(160px);
opacity:.2;
left:50%;
top:50%;
transform:translate(-50%,-50%);
}

/* CAR */

.car{
position:absolute;
bottom:100px;
width:100%;
z-index:5;
filter:
drop-shadow(0 30px 60px rgba(0,247,255,.3));
}

.car img{
width:100%;
}

/* HEADLIGHT */

.light{
position:absolute;
right:80px;
bottom:210px;
width:120px;
height:30px;
background:#00ffff;
filter:blur(25px);
}

/* WHEELS */

.wheel{
position:absolute;
width:85px;
height:85px;
border-radius:50%;
border:8px solid #555;
background:#111;
bottom:100px;
}

.wheel::after{
content:'';
position:absolute;
width:18px;
height:18px;
background:#999;
border-radius:50%;
left:50%;
top:50%;
transform:translate(-50%,-50%);
}

.front{
right:130px;
}

.back{
left:120px;
}

/* ROAD */

.road{
position:absolute;
bottom:0;
left:0;
width:300%;
height:8px;

background:
repeating-linear-gradient(
90deg,
white 0,
white 100px,
transparent 100px,
transparent 180px
);
}

/* RESPONSIVE */

@media(max-width:1000px){

.hero{
flex-direction:column;
justify-content:center;
text-align:center;
}

.scene{
width:500px;
}

.title{
font-size:4rem;
}

nav ul{
display:none;
}

}


</style>
</head>
<body>

<div id="stars"></div>

<nav>

<div class="logo">AUTO X</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Models</a></li>
<li><a href="#">Gallery</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>

<section class="hero">

<div class="left">

<div class="tag">
NEXT GENERATION ELECTRIC
</div>

<h1 class="title">
DRIVE
<span>THE FUTURE</span>
</h1>

<p class="desc">
Luxury performance engineered for tomorrow.
Experience speed, innovation and cutting-edge
technology like never before.
</p>

<div class="buttons">

<button class="btn primary">
Explore Cars
</button>

<button class="btn secondary">
Watch Video
</button>

</div>

</div>

<div class="scene">

<div class="glow"></div>

<div class="light"></div>

<div class="car">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1200" alt="">
</div>

<div class="wheel back"></div>
<div class="wheel front"></div>

</div>

</section>

<div class="road"></div>

<script>

/* STARS */

for(let i=0;i<250;i++){

const star=document.createElement("div");

star.classList.add("star");

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

let size=Math.random()*3;

star.style.width=size+"px";
star.style.height=size+"px";

document.getElementById("stars")
.appendChild(star);

gsap.to(star,{
y:-1500,
repeat:-1,
ease:"none",
duration:Math.random()*25+15
});

}

/* INTRO */

const tl=gsap.timeline();

tl.from(".logo",{
y:-100,
opacity:0,
duration:1
})

.from("nav li",{
y:-50,
opacity:0,
stagger:.1,
duration:.6
},"-=.6")

.from(".tag",{
x:-100,
opacity:0
})

.from(".title",{
y:150,
opacity:0,
duration:1.2
},"-=.4")

.from(".desc",{
opacity:0,
y:50
},"-=.6")

.from(".btn",{
scale:0,
opacity:0,
stagger:.2
},"-=.6")

.from(".car",{
x:1500,
rotation:-10,
duration:2,
ease:"expo.out"
},"-=1")

.from(".wheel",{
scale:0,
duration:1
},"-=1");

/* ROAD */

gsap.to(".road",{
x:-500,
repeat:-1,
ease:"none",
duration:2
});

/* WHEELS */

gsap.to(".wheel",{
rotation:360,
repeat:-1,
ease:"none",
duration:.25
});

/* CAR FLOAT */

gsap.to(".car",{
y:-15,
repeat:-1,
yoyo:true,
duration:2,
ease:"sine.inOut"
});

/* GLOW */

gsap.to(".glow",{
scale:1.3,
opacity:.35,
repeat:-1,
yoyo:true,
duration:2
});

/* HEADLIGHT */

gsap.to(".light",{
opacity:.4,
repeat:-1,
yoyo:true,
duration:.6
});

/* MOUSE PARALLAX */

window.addEventListener("mousemove",(e)=>{

let x=(e.clientX/window.innerWidth-.5)*60;
let y=(e.clientY/window.innerHeight-.5)*40;

gsap.to(".car",{
x:x,
y:y,
duration:1
});

gsap.to(".glow",{
x:x*.5,
y:y*.5,
duration:1.5
});

});

/* MAGNETIC BUTTON */

document.querySelectorAll(".btn")
.forEach(btn=>{

btn.addEventListener("mousemove",(e)=>{

const rect=btn.getBoundingClientRect();

const x=e.clientX-rect.left-rect.width/2;
const y=e.clientY-rect.top-rect.height/2;

gsap.to(btn,{
x:x*.25,
y:y*.25,
duration:.3
});

});

btn.addEventListener("mouseleave",()=>{

gsap.to(btn,{
x:0,
y:0,
duration:.5
});

});

});

</script>

</body>
</html>
