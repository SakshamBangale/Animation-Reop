<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Animation Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(to bottom,#6ec6ff,#dff6ff);
}

/* Navbar */
nav{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    padding:15px 40px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:10;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#fff;
}

nav ul{
    display:flex;
    gap:30px;
    list-style:none;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:600;
}

/* Hero */
.hero{
    position:absolute;
    top:50%;
    left:10%;
    transform:translateY(-50%);
    z-index:5;
    color:white;
}

.hero h1{
    font-size:70px;
    margin-bottom:20px;
    text-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.hero p{
    max-width:500px;
    font-size:18px;
    line-height:1.6;
    margin-bottom:30px;
}

.btn{
    padding:15px 35px;
    border:none;
    border-radius:50px;
    margin-right:15px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.primary{
    background:#ff3c41;
    color:white;
}

.secondary{
    background:white;
    color:#333;
}

/* Mountains */
.mountain{
    position:absolute;
    bottom:180px;
    width:100%;
    height:300px;
    background:
    polygon(0% 100%,20% 30%,40% 100%,60% 20%,80% 100%,100% 40%,100% 100%);
}

.mountains{
    position:absolute;
    bottom:180px;
    width:100%;
    height:300px;
    background:#5c7c89;
    clip-path:polygon(
    0 100%,10% 50%,20% 100%,
    35% 30%,50% 100%,
    65% 20%,80% 100%,
    100% 40%,100% 100%);
}

/* Road */
.road{
    position:absolute;
    bottom:0;
    width:100%;
    height:180px;
    background:#333;
}

.road::before{
    content:"";
    position:absolute;
    top:50%;
    left:0;
    width:300%;
    height:8px;
    background:repeating-linear-gradient(
        to right,
        white 0,
        white 60px,
        transparent 60px,
        transparent 120px
    );
    animation:roadMove 2s linear infinite;
}

@keyframes roadMove{
    from{transform:translateX(0);}
    to{transform:translateX(-120px);}
}

/* Car */
.car-container{
    position:absolute;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    animation:carBounce 1s ease-in-out infinite alternate;
}

@keyframes carBounce{
    from{transform:translateX(-50%) translateY(0);}
    to{transform:translateX(-50%) translateY(-6px);}
}

.car{
    position:relative;
    width:420px;
    height:120px;
}

/* Car Body */
.body{
    position:absolute;
    width:100%;
    height:80px;
    bottom:20px;
    background:#ff3c41;
    border-radius:30px 60px 20px 20px;
    box-shadow:0 15px 30px rgba(0,0,0,.3);
}

.top{
    position:absolute;
    width:180px;
    height:60px;
    background:#ff3c41;
    left:90px;
    top:0;
    border-radius:30px 30px 0 0;
}

.window{
    position:absolute;
    width:70px;
    height:40px;
    background:#9ee8ff;
    top:10px;
    border-radius:10px;
}

.w1{left:20px;}
.w2{right:20px;}

.headlight{
    position:absolute;
    right:-5px;
    top:35px;
    width:20px;
    height:12px;
    background:yellow;
    border-radius:10px;
    box-shadow:0 0 20px yellow;
}

/* Wheels */
.wheel{
    position:absolute;
    width:70px;
    height:70px;
    background:#222;
    border:8px solid #666;
    border-radius:50%;
    bottom:-10px;
    animation:spin .5s linear infinite;
}

.wheel::after{
    content:"";
    position:absolute;
    width:20px;
    height:20px;
    background:#aaa;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.front{
    right:50px;
}

.back{
    left:50px;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* Floating particles */
.particle{
    position:absolute;
    background:white;
    border-radius:50%;
    opacity:.8;
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-100vh);
        opacity:0;
    }
}

@media(max-width:768px){

.hero{
    left:5%;
}

.hero h1{
    font-size:42px;
}

.car{
    transform:scale(.7);
}

nav ul{
    display:none;
}
}
</style>
</head>
<body>

<nav>
    <div class="logo">AUTO-X</div>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Models</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<div class="hero">
    <h1>Future Driving</h1>
    <p>
        Experience speed, luxury and innovation with our
        next-generation sports cars.
    </p>

    <button class="btn primary">Explore Cars</button>
    <button class="btn secondary">Watch Video</button>
</div>

<div class="mountains"></div>

<div class="car-container">
    <div class="car">

        <div class="top">
            <div class="window w1"></div>
            <div class="window w2"></div>
        </div>

        <div class="body">
            <div class="headlight"></div>
        </div>

        <div class="wheel back"></div>
        <div class="wheel front"></div>

    </div>
</div>

<div class="road"></div>

<script>
// Floating particles
for(let i=0;i<40;i++){

    const p=document.createElement("div");
    p.classList.add("particle");

    const size=Math.random()*6+2;

    p.style.width=size+"px";
    p.style.height=size+"px";
    p.style.left=Math.random()*100+"vw";
    p.style.bottom="-20px";

    p.style.animationDuration=
        (Math.random()*8+5)+"s";

    p.style.animationDelay=
        Math.random()*5+"s";

    document.body.appendChild(p);
}
</script>

</body>
</html>
